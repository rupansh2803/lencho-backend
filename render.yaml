services:
  - type: web
    name: lencho-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: REQUIRE_MONGODB
        value: true
      - key: CREATE_INITIAL_ADMIN
        value: false
      - key: FRONTEND_URL
        value: https://lencho.in
      - key: SITE_URL
        value: https://lencho.in
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
